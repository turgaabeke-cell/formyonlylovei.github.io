<title>Ты моя вселенная ❤️</title>

<link href="./for only love i_files/css2" rel="stylesheet">

<style>

body{
    margin:0;
    overflow:hidden;
    background: linear-gradient(to top, #6a0dad, #add8e6);
    text-align:center;
    font-family: 'Playfair Display', serif;
    color:white;
    padding:80px;
}

/* Заголовок */
h1{
    font-size:60px;
    animation: fadeIn 3s ease-in-out;
}

/* Текст — как цитата */
p{
    font-size:28px;
    font-style: italic;
    max-width:900px;
    margin:auto;
    line-height:1.8;
    animation: fadeIn 4s ease-in-out;
}

/* Анимация */
@keyframes fadeIn{
    from{
        opacity:0;
        transform: translateY(50px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

/* Пиксельные сердечки — задний фон */
.heart{
    position:absolute;
    font-size:30px;
    color:#ff69b4;
    opacity:0.6;
    animation: float 6s linear infinite;
    pointer-events:none;
}

/* Плавное движение */
@keyframes float{
    from{
        transform: translateY(100vh) scale(0.8);
    }
    to{
        transform: translateY(-10vh) scale(1.2);
    }
}

</style>
</head>
<body>

<h1>Я тебя очень люблю ❤️</h1>

<p>
Ты — моя самая красивая цитата в жизни.<br><br>

Твоя доброта, твоя улыбка и твой характер делают тебя уникальной.<br>
Ты как свет, который освещает мои самые тёмные дни.<br>
Я ценю тебя больше, чем ты думаешь 💖
</p>

<script>

/* Создание пиксельных сердечек на заднем фоне */
function createHeart(){

    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💗"; // пиксельное сердце

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    heart.style.fontSize = (20 + Math.random() * 25) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,250);

</script>
